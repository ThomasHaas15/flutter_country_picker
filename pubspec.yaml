name: local_country_picker
description: "A self-contained Flutter country picker. 205 countries, bundled flag PNGs (round + rect), EN/NL translations, theme-aware styling. No network calls."
version: 0.1.0
homepage: https://github.com/ThomasHaas15/local_country_picker
repository: https://github.com/ThomasHaas15/local_country_picker
issue_tracker: https://github.com/ThomasHaas15/local_country_picker/issues

topics:
  - country
  - picker
  - flag
  - localization
  - offline

screenshots:
  - description: "Country list, theme-aware."
    path: screenshots/list.png
  - description: "Search filter."
    path: screenshots/search.png

environment:
  sdk: ^3.9.0
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/flags/rect/
    - assets/flags/round/
    - assets/l10n/
