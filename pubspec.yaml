name: flutter_country_picker
description: "A Flutter country picker with bundled flag assets (rounded + rectangular), EN/NL translations, and theme-aware styling. No network calls."
version: 0.1.0
homepage: https://github.com/ThomasHaas15/flutter_country_picker
repository: https://github.com/ThomasHaas15/flutter_country_picker

environment:
  sdk: ^3.9.0
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/flags/rect/
    - assets/flags/round/
    - assets/l10n/

  fonts:
    - family: SFProText
      fonts:
        - asset: assets/fonts/SF-Pro-Text-Regular.otf
          weight: 400
        - asset: assets/fonts/SF-Pro-Text-Semibold.otf
          weight: 600
